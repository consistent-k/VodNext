name: First Interaction

on:
    pull_request_target:
        types: [opened]
    issues:
        types: [opened]

jobs:
    welcome:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/first-interaction@v1.3.0
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  pr-message: >-
                      Thanks for your first contribution! Please make sure your PR follows our commit conventions (conventional commits). We'll review it soon.

                  issue-message: >-
                      Thanks for opening your first issue! We'll take a look and get back to you.

